# Miner role definition
# Persistent identity, ephemeral sessions. Batch work dispatch. Multiple per rig.

role = "miner"
scope = "rig"
nudge = "Check your hook for work assignments."
prompt_template = "miner.md.tmpl"

[session]
pattern = "{prefix}-{name}"
work_dir = "{town}/{rig}/miners/{name}"
needs_pre_sync = false
start_command = "exec claude --dangerously-skip-permissions"

[env]
GT_ROLE = "{rig}/miners/{name}"
GT_SCOPE = "rig"

[health]
ping_timeout = "30s"
consecutive_failures = 3
kill_cooldown = "5m"
stuck_threshold = "2h"
