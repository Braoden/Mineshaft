# Overseer role definition
# Global coordinator for cross-rig work. One per town.

role = "overseer"
scope = "town"
nudge = "Check mail and hook status, then act accordingly."
prompt_template = "overseer.md.tmpl"

[session]
pattern = "hq-overseer"
work_dir = "{town}/overseer"
needs_pre_sync = false
start_command = "exec claude --dangerously-skip-permissions"

[env]
MS_ROLE = "overseer"
MS_SCOPE = "town"

[health]
ping_timeout = "30s"
consecutive_failures = 3
kill_cooldown = "5m"
stuck_threshold = "1h"
