description = """
Feed stranded minecarts by dispatching ready work to available miners.

Dogs execute this formula when the Supervisor detects a stranded minecart. A minecart
is stranded when it has ready issues (open, unblocked, no assignee) but no
workers are processing them.

## Dog Contract

This is infrastructure work. You:
1. Receive minecart ID via variable
2. Load minecart and find ready issues
3. Check idle miner capacity across rigs
4. Dispatch min(ready_issues, idle_miners) using ms sling
5. Report actions taken
6. Return to kennel

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| minecart | --var | The stranded minecart ID to feed |

## Single Pass Design

Dog doesn't babysit or wait for completion. The workflow is:
1. Find ready issues in minecart
2. Dispatch each to an available miner
3. Exit immediately

If minecart is still stranded next Supervisor patrol cycle, another dog will be
dispatched. This keeps the system stateless and batch-oriented.

## Failure Modes

| Situation | Action |
|-----------|--------|
| Minecart not found | Exit with error, notify Supervisor |
| No ready issues | Exit success (false positive, minecart is fine) |
| No idle miners | Exit success, note in report (will retry next cycle) |
| Sling fails | Continue with remaining issues, note failures |"""
formula = "mol-minecart-feed"
version = 1

[squash]
trigger = "on_complete"
template_type = "work"
include_metrics = true

[[steps]]
id = "load-minecart"
title = "Load minecart and identify ready issues"
description = """
Load the minecart and find issues ready for dispatch.

**1. Check assignment:**
```bash
ms hook               # Shows minecart in hook_bead or vars
```

**2. Load minecart details:**
```bash
ms minecart status {{minecart}} --json
```

**3. Identify ready issues:**

For each tracked issue in the minecart:
```bash
bd show <issue-id> --json
```

An issue is "ready" if ALL of these are true:
- status = "open" (NOT in_progress, closed, or hooked)
- not in blocked list (check: bd blocked --json)
- assignee is empty OR assignee session is dead

Check blocked status:
```bash
bd blocked --json
# If issue ID appears here, it's blocked (skip it)
```

Check assignee session if set:
```bash
# If assignee like "mineshaft/miners/nux"
tmux has-session -t ms-mineshaft-miner-nux 2>/dev/null && echo "alive" || echo "dead"
```

**4. Build ready list:**
Collect all ready issues with their metadata:
- Issue ID
- Title
- Priority
- Rig (extracted from prefix)

Sort by priority (P0 first) for dispatch order.

**Exit criteria:** Ready issues identified and prioritized."""

[[steps]]
id = "check-capacity"
title = "Check miner capacity across rigs"
needs = ["load-minecart"]
description = """
Determine how many miners are available for dispatch.

**1. For each rig that has ready issues:**
```bash
ms miners <rig>
# Shows miner status: idle, working, etc.
```

**2. Count available capacity:**
Available miners are those that:
- Exist in the rig's miner pool
- Currently idle (no hooked work)
- Session is running

**3. Calculate dispatch count:**
```
dispatch_count = min(ready_issues, available_miners)
```

If dispatch_count = 0:
- Log: "No capacity available, will retry next cycle"
- Proceed to report step (no dispatches to make)

**4. Match issues to rigs:**
For each ready issue, determine target rig from issue prefix:
- ms-* issues → mineshaft rig
- bd-* issues → beads rig
- etc.

**Exit criteria:** Dispatch plan created with issue→rig mappings."""

[[steps]]
id = "dispatch-work"
title = "Dispatch ready issues to miners"
needs = ["check-capacity"]
description = """
Sling each ready issue to an available miner.

**For each issue in dispatch plan:**

```bash
# Dispatch issue to the appropriate rig
# This spawns a fresh miner or assigns to idle one
ms sling <issue-id> <rig>

# Example:
ms sling ms-abc123 mineshaft
ms sling bd-xyz789 beads
```

**Track results:**
For each dispatch:
- Success: Note issue ID, target rig, miner assigned
- Failure: Note issue ID, error message

**Important notes:**
- `ms sling` handles miner selection automatically
- It will spawn a new miner if none available
- The miner gets the issue hooked and starts immediately
- Don't wait for miner to complete - fire and forget

**If sling fails:**
- Continue with remaining issues
- Note the failure for the report
- Don't escalate individual failures (will retry next cycle)

**Exit criteria:** All dispatchable issues have been slung."""

[[steps]]
id = "report-results"
title = "Generate and send feeding report"
needs = ["dispatch-work"]
description = """
Create summary report of minecart feeding actions.

**1. Generate report:**
```markdown
## Minecart Feed Report: {{minecart}}

**Ready issues found**: {{ready_count}}
**Miners available**: {{available_count}}
**Issues dispatched**: {{dispatch_count}}

### Dispatched Work
{{#each dispatched}}
- {{issue_id}}: {{title}} → {{rig}}/{{miner}}
{{/each}}

### Skipped (no capacity)
{{#if skipped}}
{{#each skipped}}
- {{issue_id}}: {{title}} (will retry next cycle)
{{/each}}
{{else}}
(none)
{{/if}}

### Errors
{{#if errors}}
{{#each errors}}
- {{issue_id}}: {{error}}
{{/each}}
{{else}}
(none)
{{/if}}
```

**2. Send to Supervisor:**
```bash
ms mail send supervisor/ -s "Minecart fed: {{minecart}}" -m "$(cat <<EOF
Minecart {{minecart}} feeding complete.

Dispatched: {{dispatch_count}}/{{ready_count}} issues
{{#if errors}}Errors: {{error_count}}{{/if}}

{{report_summary}}
EOF
)"
```

**3. Update minecart (optional):**
If minecart has a notify field, could add a note about feeding activity.
Not required - the dispatch tracking handles visibility.

**Exit criteria:** Report generated and sent."""

[[steps]]
id = "return-to-kennel"
title = "Signal completion and return to kennel"
needs = ["report-results"]
description = """
Signal work complete and return to available pool.

**1. Signal completion to Supervisor:**
```bash
ms mail send supervisor/ -s "DOG_DONE $(hostname)" -m "Task: minecart-feed
Minecart: {{minecart}}
Ready: {{ready_count}}
Dispatched: {{dispatch_count}}
Status: COMPLETE

Ready for next assignment."
```

**2. Return to kennel:**
Dog returns to available state in the pool. Supervisor will assign next work
or retire the dog if pool is oversized.

**Exit criteria:** Supervisor notified, dog ready for next work or retirement."""

[vars]
[vars.minecart]
description = "The minecart ID to feed"
required = true

[vars.available_count]
description = "Number of available miners (computed during execution)"
default = ""

[vars.dispatch_count]
description = "Number of issues dispatched (computed during execution)"
default = ""

[vars.error]
description = "Error message for a failed dispatch (computed during execution)"
default = ""

[vars.error_count]
description = "Number of dispatch errors (computed during execution)"
default = ""

[vars.issue_id]
description = "Issue ID being dispatched (computed during execution)"
default = ""

[vars.miner]
description = "Miner assigned to work (computed during execution)"
default = ""

[vars.ready_count]
description = "Number of ready issues found (computed during execution)"
default = ""

[vars.report_summary]
description = "Summary text for the feeding report (computed during execution)"
default = ""

[vars.rig]
description = "Target rig for dispatch (computed during execution)"
default = ""

[vars.title]
description = "Issue title (computed during execution)"
default = ""
