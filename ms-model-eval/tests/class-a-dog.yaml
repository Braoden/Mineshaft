# Class A Reasoning Tests: Dog
# Fixed neutral role_context — no answer hints. Tests raw reasoning from evidence.

- description: "[Class A] Dog orphan: dead assignee, no branch, no commits"
  vars:
    role: dog
    role_context: >
      You are a Dog executing the orphan scan formula. You triage orphaned work items
      by examining session status, git state, and bead metadata. You classify each
      orphan and decide the appropriate action based on the evidence in the shell
      output below.
    formula_step: triage-orphans
    allowed_actions: '["reset", "reassign", "recover", "escalate", "burn"]'
    shell_output: |
      ## Orphan: ms-work1 "Add user roles"
      $ bd show ms-work1 --json
      {"id": "ms-work1", "title": "Add user roles", "status": "in_progress", "assignee": "miner-Toast"}

      $ tmux has-session -t bd-miner-Toast 2>/dev/null; echo $?
      1

      $ git branch -a | grep -i "user.roles\|Toast"
      (no output)

      $ ls /town/mineshaft/miners/Toast 2>/dev/null
      ls: /town/mineshaft/miners/Toast: No such file or directory
    context: ""
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        return d.action === "reset";

- description: "[Class A] Dog orphan: unpushed commits on local branch"
  vars:
    role: dog
    role_context: >
      You are a Dog executing the orphan scan formula. You triage orphaned work items
      by examining session status, git state, and bead metadata. You classify each
      orphan and decide the appropriate action based on the evidence in the shell
      output below.
    formula_step: triage-orphans
    allowed_actions: '["reset", "reassign", "recover", "escalate", "burn"]'
    shell_output: |
      ## Orphan: ms-work4 "Add search feature"
      $ bd show ms-work4 --json
      {"id": "ms-work4", "title": "Add search feature", "status": "in_progress", "assignee": "miner-Waffles"}

      $ tmux has-session -t bd-miner-Waffles 2>/dev/null; echo $?
      1

      $ git -C /town/mineshaft/miners/Waffles log --oneline origin/main..HEAD
      a1b2c3d feat: add search endpoint
      d4e5f6g feat: search UI component
      h7i8j9k feat: search indexing
      k0l1m2n test: search integration tests
      o3p4q5r docs: search API documentation

      $ git -C /town/mineshaft/miners/Waffles branch -vv | grep '*'
      * feat/search a1b2c3d [no remote] feat: add search endpoint
    context: ""
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        return d.action === "recover";

