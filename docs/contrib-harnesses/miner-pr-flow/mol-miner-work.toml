# Formula overlay: miner-PR-flow
#
# Appends a PR-creation requirement to the final submit step of
# mol-miner-work. Use this in rigs that gate work on a GitHub PR review
# rather than the canonical Refinery merge queue.
#
# Install to: ~/ms/<rig>/formula-overlays/mol-miner-work.toml
# Verify with: ms doctor  (checks overlay-health)
# See also:    directives/miner.md in this harness

[[step-overrides]]
step_id = "submit-and-exit"
mode = "append"
description = """
**PR-flow addendum (rig override):**

Before you run `ms done`, push your branch and ensure a GitHub PR exists
for it. In this rig, a PR is the review artifact — `ms done` alone is not
sufficient.

```bash
git push -u origin HEAD

BRANCH=$(git branch --show-current)
if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
  gh pr create --fill --base {{base_branch}} --head "$BRANCH"
fi
```

Only then run `ms done`. If `gh pr create` fails (auth, rate-limit, missing
template, unknown base), escalate to Witness — do NOT skip PR creation.
"""
